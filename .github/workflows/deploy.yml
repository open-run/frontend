name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'

concurrency:
  group: deploy-production
  cancel-in-progress: false # never cancel a deploy mid-flight; queue instead

env:
  REGISTRY: asia-northeast3-docker.pkg.dev
  IMAGE_BASE: asia-northeast3-docker.pkg.dev/openrun-452712/openrun-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [web, admin]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: asia-northeast3-docker.pkg.dev
          username: _json_key_base64
          password: ${{ secrets.GCP_DEPLOYMENT_SA_KEY }}

      # Decode the per-app env-file secret (base64) to a file on the runner. It is
      # passed to the build as a BuildKit secret (not a build-arg / not a layer) and
      # removed after. NEXT_PUBLIC_* inside it are inlined by `next build`.
      - name: Decode env-file secret for ${{ matrix.app }}
        env:
          WEB_ENV: ${{ secrets.WEB_ENV }}
          ADMIN_ENV: ${{ secrets.ADMIN_ENV }}
        run: |
          if [ "${{ matrix.app }}" = "web" ]; then printf '%s' "$WEB_ENV"; else printf '%s' "$ADMIN_ENV"; fi \
            | base64 -d > appenv.production
          test -s appenv.production || { echo "empty env-file secret for ${{ matrix.app }}"; exit 1; }

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP=${{ matrix.app }}
          secret-files: |
            appenv=appenv.production
          tags: |
            ${{ env.IMAGE_BASE }}/${{ matrix.app }}:latest
            ${{ env.IMAGE_BASE }}/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Clean up decoded secret
        if: always()
        run: rm -f appenv.production

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.GCE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.GCE_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSH_CMD=ssh -i $HOME/.ssh/id_deploy ${{ secrets.GCE_SSH_USER }}@${{ secrets.GCE_HOST }}" >> "$GITHUB_ENV"

      - name: Registry login on VM (key via stdin, never argv)
        env:
          SA_KEY: ${{ secrets.GCP_DEPLOYMENT_SA_KEY }}
        run: |
          printf '%s' "$SA_KEY" | $SSH_CMD \
            'docker login -u _json_key_base64 --password-stdin https://asia-northeast3-docker.pkg.dev'

      # Same per-app secret as the build, decoded straight into the runtime --env-file
      # on the VM (mode 600). It already carries API_SERVER_URL=http://openrun:8080 and
      # the server-only keys. Values must be unquoted/space-free (docker --env-file does
      # not strip quotes) — enforced by the .env.production.example convention.
      - name: Write runtime env files on VM (via stdin, mode 600)
        env:
          WEB_ENV: ${{ secrets.WEB_ENV }}
          ADMIN_ENV: ${{ secrets.ADMIN_ENV }}
        run: |
          printf '%s' "$WEB_ENV" | base64 -d \
            | $SSH_CMD 'umask 077 && mkdir -p ~/openrun && cat > ~/openrun/web.env'
          printf '%s' "$ADMIN_ENV" | base64 -d \
            | $SSH_CMD 'umask 077 && mkdir -p ~/openrun && cat > ~/openrun/admin.env'

      - name: Deploy containers
        env:
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          # Quoted heredoc: nothing is expanded on the runner. TAG arrives as $1 over SSH.
          cat > deploy.sh <<'DEPLOY'
          set -euo pipefail
          TAG="$1"
          IMAGE_BASE=asia-northeast3-docker.pkg.dev/openrun-452712/openrun-frontend

          docker network inspect openur-network >/dev/null 2>&1 \
            || docker network create openur-network

          deploy_one() { # name host_port image env_file
            local name="$1" host_port="$2" image="$3" env_file="$4"
            docker pull "$image"
            docker rm -f "$name" 2>/dev/null || true
            docker run -d --name "$name" \
              --network openur-network \
              -p "$host_port":3000 \
              --env-file "$env_file" \
              --restart always \
              "$image"
            for _ in $(seq 1 30); do
              status=$(docker inspect --format '{{.State.Health.Status}}' "$name" 2>/dev/null || echo starting)
              [ "$status" = healthy ] && return 0
              sleep 3
            done
            echo "$name failed to become healthy"
            docker logs --tail 100 "$name"
            return 1
          }

          deploy_one openrun-web   3000 "$IMAGE_BASE/web:$TAG"   "$HOME/openrun/web.env"
          deploy_one openrun-admin 3001 "$IMAGE_BASE/admin:$TAG" "$HOME/openrun/admin.env"

          docker image prune -af --filter "until=168h" || true
          DEPLOY

          $SSH_CMD 'bash -s' -- "$DEPLOY_SHA" < deploy.sh
